openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Bimboy Studios API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: feed
  - name: creators
  - name: purchases
  - name: interactions
  - name: analytics
  - name: earnings
  - name: consent
  - name: scene-applications
    description: Creators applying to shoot scenes for studio brands.
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /feed:
    get:
      operationId: getFeed
      tags: [feed]
      summary: Vertical swipe feed of teasers
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
  /creators:
    get:
      operationId: listCreators
      tags: [creators]
      summary: List trending creators
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Creator" }
    post:
      operationId: createCreator
      tags: [creators]
      summary: Create a creator profile owned by the signed-in user (onboarding)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatorCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Creator" }
        "400": { description: Invalid request }
        "401": { description: Authentication required }
  /me/creators:
    get:
      operationId: listMyCreators
      tags: [creators]
      summary: Creators owned by the signed-in user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Creator" }
        "401": { description: Authentication required }
  /creators/{handle}:
    get:
      operationId: getCreator
      tags: [creators]
      parameters:
        - in: path
          name: handle
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Creator" }
        "404": { description: Not found }
  /creators/{handle}/videos:
    get:
      operationId: getCreatorVideos
      tags: [creators]
      parameters:
        - in: path
          name: handle
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeedResponse" }
        "404": { description: Not found }
  /creators/{handle}/profile:
    patch:
      operationId: updateCreatorProfile
      tags: [creators]
      summary: Update creator profile fields (links, X handle, testing status)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: handle
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatorProfileUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Creator" }
        "400": { description: Invalid request }
        "404": { description: Not found }
  /creators/{handle}/collab:
    get:
      operationId: getCreatorCollab
      tags: [creators]
      summary: Get a creator's CollabFast link (creators/pornstars only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: handle
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CollabLink" }
        "403": { description: Viewer is not a creator }
        "404": { description: Not found }
  /creators/{handle}/refresh-followers:
    post:
      operationId: refreshCreatorFollowers
      tags: [creators]
      summary: Fetch and cache the creator's X/Twitter follower count
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: handle
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Creator" }
        "400": { description: No X handle set }
        "404": { description: Not found }
        "502":
          description: X API unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /creators/{handle}/email:
    get:
      operationId: getCreatorEmail
      tags: [creators]
      summary: Read the creator's contact email and verification state (owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: handle
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailStatus" }
        "403": { description: Not the owner }
        "404": { description: Not found }
    post:
      operationId: setCreatorEmail
      tags: [creators]
      summary: Set or update the creator's contact email and send a confirmation (owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: handle
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmailUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailStatus" }
        "400": { description: Invalid email }
        "403": { description: Not the owner }
        "404": { description: Not found }
        "502":
          description: Email delivery unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /email/verify:
    post:
      operationId: verifyCreatorEmail
      tags: [creators]
      summary: Confirm a creator email from the link sent by email (public)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmailVerifyRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailVerifyResult" }
        "400": { description: Missing token }
  /creators/{handle}/verification:
    get:
      operationId: getCreatorVerification
      tags: [creators]
      summary: Read the creator's Didit ID-verification status (owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: handle
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerificationStatus" }
        "403": { description: Not the owner }
        "404": { description: Not found }
  /creators/{handle}/verification/session:
    post:
      operationId: createCreatorVerificationSession
      tags: [creators]
      summary: Start a Didit ID-verification session and get the hosted URL (owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: handle
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerificationSessionRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerificationSession" }
        "403": { description: Not the owner }
        "404": { description: Not found }
        "502":
          description: Didit unavailable or not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /library:
    get:
      operationId: getLibrary
      tags: [purchases]
      summary: Videos the user has unlocked
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeedResponse" }
  /videos/{videoId}/like:
    post:
      operationId: toggleLike
      tags: [interactions]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InteractionResponse" }
  /videos/{videoId}/save:
    post:
      operationId: toggleSave
      tags: [interactions]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InteractionResponse" }
  /purchases:
    post:
      operationId: createPurchase
      tags: [purchases]
      summary: Placeholder CCBill PPV purchase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PurchaseRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PurchaseResponse" }
  /purchases/me:
    get:
      operationId: listMyPurchases
      tags: [purchases]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Purchase" }
  /videos/{videoId}/events:
    post:
      operationId: trackVideoEvent
      tags: [analytics]
      summary: Log a teaser click or view event
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VideoEventRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "404": { description: Not found }
  /videos/stats:
    get:
      operationId: getVideoStats
      tags: [analytics]
      summary: Funnel and revenue stats for one video
      parameters:
        - in: query
          name: videoId
          required: true
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VideoStats" }
  /creators/{handle}/earnings:
    get:
      operationId: getCreatorEarnings
      tags: [earnings]
      summary: Lifetime and available balance with per-video breakdown
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: handle
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreatorEarnings" }
        "404": { description: Not found }
  /creators/{handle}/payouts:
    get:
      operationId: listCreatorPayouts
      tags: [earnings]
      summary: Payout history for a creator
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: handle
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Payout" }
        "404": { description: Not found }
    post:
      operationId: requestCreatorPayout
      tags: [earnings]
      summary: Request a payout of the available balance
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: handle
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PayoutRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayoutCreated" }
        "400": { description: Invalid request }
        "404": { description: Not found }
  /rankings/creators:
    get:
      operationId: getCreatorRankings
      tags: [earnings]
      summary: Leaderboard of creators by earnings
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CreatorRanking" }
  /videos/{videoId}/consent-documents:
    get:
      operationId: listConsentDocuments
      tags: [consent]
      summary: List consent documents for a video
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ConsentDocument" }
    post:
      operationId: createConsentDocument
      tags: [consent]
      summary: Record a consent document after upload
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConsentDocumentRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConsentDocument" }
        "400": { description: Invalid request }
        "404": { description: Not found }
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir.
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /scene-applications:
    post:
      operationId: createSceneApplication
      tags: [scene-applications]
      summary: Apply to shoot scenes for a studio brand (creators only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SceneApplicationCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SceneApplication" }
        "400": { description: Invalid request }
        "401": { description: Authentication required }
        "403": { description: You do not own this creator profile }
        "404": { description: Creator profile not found }
    get:
      operationId: listSceneApplications
      tags: [scene-applications]
      summary: List all scene applications (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SceneApplicationAdmin" }
        "401": { description: Authentication required }
        "403": { description: Admin access required }
  /me/scene-applications:
    get:
      operationId: listMySceneApplications
      tags: [scene-applications]
      summary: Scene applications submitted by the signed-in creator
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SceneApplication" }
        "401": { description: Authentication required }
  /scene-applications/{id}:
    patch:
      operationId: updateSceneApplicationStatus
      tags: [scene-applications]
      summary: Approve or decline a scene application (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SceneApplicationStatusUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SceneApplicationAdmin" }
        "400": { description: Invalid request }
        "401": { description: Authentication required }
        "403": { description: Admin access required }
        "404": { description: Not found }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }
    Creator:
      type: object
      required: [id, handle, displayName, avatarUrl, verified, platformLinks, testingVerified, idVerificationStatus]
      properties:
        id: { type: string }
        handle: { type: string }
        displayName: { type: string }
        avatarUrl: { type: string }
        bio: { type: string, nullable: true }
        verified: { type: boolean }
        platformLinks:
          type: array
          items: { $ref: "#/components/schemas/PlatformLink" }
        xHandle: { type: string, nullable: true }
        followerCount: { type: integer, nullable: true }
        followersUpdatedAt: { type: string, format: date-time, nullable: true }
        lastTestedAt: { type: string, format: date-time, nullable: true }
        testingVerified: { type: boolean }
        idVerificationStatus:
          type: string
          enum: [not_started, pending, in_review, approved, declined]
          description: >-
            Didit ID/age (KYC) verification status. Distinct from `verified`
            (creator badge) and `testingVerified` (STI/health). Creators must be
            `approved` before they can publish drops or go live.
    CollabLink:
      type: object
      required: [collabFastUrl]
      properties:
        collabFastUrl: { type: string, nullable: true }
    VerificationStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [not_started, pending, in_review, approved, declined]
        sessionId: { type: string, nullable: true }
    VerificationSession:
      type: object
      required: [url, status]
      properties:
        url:
          type: string
          description: Didit hosted verification URL to redirect the creator to.
        status:
          type: string
          enum: [not_started, pending, in_review, approved, declined]
    VerificationSessionRequest:
      type: object
      properties:
        callbackUrl:
          type: string
          description: >-
            Absolute http(s) URL the browser should return to after the hosted
            flow. The client passes its own origin + base path so the redirect
            lands inside the app.
    PlatformLink:
      type: object
      required: [label, url]
      properties:
        label: { type: string }
        url: { type: string }
    CreatorCreate:
      type: object
      required: [displayName]
      properties:
        displayName: { type: string }
        handle: { type: string }
        xHandle: { type: string, nullable: true }
        email:
          type: string
          nullable: true
          description: Optional contact email. When set, a confirmation email is sent.
        appUrl:
          type: string
          description: >-
            Absolute base URL of the app (origin + base path) used to build the
            confirmation link so it lands inside the app in dev and prod.
    EmailUpdate:
      type: object
      required: [email]
      properties:
        email: { type: string }
        appUrl:
          type: string
          description: >-
            Absolute base URL of the app (origin + base path) used to build the
            confirmation link so it lands inside the app in dev and prod.
    EmailStatus:
      type: object
      required: [email, emailVerified]
      properties:
        email: { type: string, nullable: true }
        emailVerified: { type: boolean }
    EmailVerifyRequest:
      type: object
      required: [token]
      properties:
        token: { type: string }
    EmailVerifyResult:
      type: object
      required: [verified]
      properties:
        verified: { type: boolean }
        handle: { type: string, nullable: true }
    CreatorProfileUpdate:
      type: object
      properties:
        bio: { type: string, nullable: true }
        platformLinks:
          type: array
          items: { $ref: "#/components/schemas/PlatformLink" }
        xHandle: { type: string, nullable: true }
        followerCount: { type: integer, nullable: true }
        lastTestedAt: { type: string, format: date-time, nullable: true }
        testingVerified: { type: boolean }
        collabFastUrl: { type: string, nullable: true }
    FeedItem:
      type: object
      required:
        - id
        - title
        - teaserUrl
        - fullUrl
        - gradient
        - durationSeconds
        - priceCents
        - likesCount
        - savesCount
        - tags
        - postType
        - createdAt
        - creator
        - participants
        - unlocked
        - liked
        - saved
      properties:
        id: { type: string }
        title: { type: string }
        teaserUrl: { type: string }
        fullUrl: { type: string }
        posterUrl: { type: string, nullable: true }
        gradient: { type: string }
        durationSeconds: { type: integer }
        priceCents: { type: integer }
        likesCount: { type: integer }
        savesCount: { type: integer }
        tags:
          type: array
          items: { type: string }
        postType:
          type: string
          description: '"creator" (platform takes 20%) or "studio" (platform takes 33%).'
        createdAt: { type: string, format: date-time }
        creator: { $ref: "#/components/schemas/Creator" }
        participants:
          type: array
          items: { $ref: "#/components/schemas/Participant" }
        unlocked: { type: boolean }
        liked: { type: boolean }
        saved: { type: boolean }
    Participant:
      type: object
      required: [creator, splitBps]
      properties:
        creator: { $ref: "#/components/schemas/Creator" }
        splitBps: { type: integer, description: "Revenue share in basis points (0-10000)" }
    FeedResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
