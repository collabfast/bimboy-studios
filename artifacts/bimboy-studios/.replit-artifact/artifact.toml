kind = "web"
previewPath = "/"
title = "Bimboy Studios"
version = "1.0.0"
id = "artifacts/bimboy-studios"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24675

[services.development]
run = "pnpm --filter @workspace/bimboy-studios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bimboy-studios", "run", "build" ]
publicDir = "artifacts/bimboy-studios/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24675"
BASE_PATH = "/"
